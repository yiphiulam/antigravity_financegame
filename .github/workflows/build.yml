name: GitHub Actions Demo
run-name: GitHub Actions Demo

# 觸發此 action 的時機
on:
  push:
    branches:
      - '*' # 只要有任何一個 commit 被 push，就會觸發此 action
  workflow_dispatch: # 可以手動執行此 action

# 預先定義此 action 要幹嘛
jobs:
  demo:
    runs-on: ubuntu-latest

# 強制將 JavaScript actions 升級至 Node.js 24 以消除棄用警告
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    steps:
      - name: 檢查程式碼
        uses: actions/checkout@v4
        
      - name: 執行指令
        run: echo '執行成功'